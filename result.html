<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Результат — IAgree</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: Arial, sans-serif; background: #0d1117; color: #e6edf3; }
        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .card { background: #161b22; border-radius: 12px; padding: 40px; border: 1px solid #30363d; }
        h1 { color: #58a6ff; margin-bottom: 20px; }
        .btn { background: #238636; color: white; border: none; padding: 12px 30px; border-radius: 6px; font-size: 16px; cursor: pointer; transition: 0.2s; margin: 5px; }
        .btn:hover { background: #2ea043; }
        .btn.secondary { background: #1f2937; }
        .btn.secondary:hover { background: #30363d; }
        .info { background: #1f2937; padding: 15px; border-radius: 8px; margin: 20px 0; border-left: 4px solid #238636; }
        .back-link { display: inline-block; margin-top: 20px; color: #58a6ff; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 10px; margin: 20px 0; }
        footer { text-align: center; padding: 30px; color: #8b949e; font-size: 14px; border-top: 1px solid #30363d; margin-top: 40px; }
        header { background: #161b22; padding: 15px 30px; border-bottom: 1px solid #30363d; margin-bottom: 30px; }
        header > div { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        header a { color: #58a6ff; font-size: 24px; font-weight: bold; text-decoration: none; }
        header nav { display: flex; gap: 15px; flex-wrap: wrap; }
        header nav a { color: #8b949e; text-decoration: none; font-size: 14px; }
        header nav a:hover { color: #e6edf3; }
    </style>
</head>
<body>

<header>
    <div>
        <a href="index.html">📄 IAgree</a>
        <nav>
            <a href="admin.html">📤 Админ</a>
            <a href="create.html">🔑 Создать подпись</a>
            <a href="sign.html">✍️ Подписать</a>
            <a href="check.html">🔍 Проверить</a>
        </nav>
    </div>
</header>

<div class="container">
    <div class="card">
        <h1>✅ Документ подписан!</h1>
        <div class="info">
            <p>Скачайте файлы и отправьте их админу.</p>
        </div>

        <div class="btn-group">
            <button id="downloadJson" class="btn">📥 Скачать .json</button>
            <button id="downloadSign" class="btn">📥 Скачать .iagreesign</button>
        </div>

        <a href="index.html" class="back-link">← На главную</a>
    </div>
</div>

<footer>© 2026 IAgree — Сервис подписания согласий</footer>

<script>
    // === БИБЛИОТЕКА БИНАРНОГО ФОРМАТА ===
    const MAGIC = new Uint8Array([0x49, 0x41, 0x47, 0x52]); // "IAGR"
    const VERSION = 1;

    function createBinaryFile(text) {
        const encoder = new TextEncoder();
        const textBytes = encoder.encode(text);
        
        const headerSize = 4 + 1;
        const totalSize = headerSize + textBytes.length;
        
        const result = new Uint8Array(totalSize);
        result.set(MAGIC, 0);
        result[4] = VERSION;
        result.set(textBytes, headerSize);
        
        return result;
    }

    const filledText = localStorage.getItem('iagreesign_text');
    const jsonData = localStorage.getItem('iagreesign_json');

    if (!filledText || !jsonData) {
        document.querySelector('.card').innerHTML = `
            <h1 style="color: #f85149;">⚠️ Нет данных</h1>
            <p style="color: #8b949e;">Вы не подписывали документ. <a href="sign.html" style="color: #58a6ff;">Вернуться к подписанию</a></p>
            <a href="index.html" class="back-link">← На главную</a>
        `;
    }

    document.getElementById('downloadJson').addEventListener('click', function() {
        if (!jsonData) return;
        const blob = new Blob([jsonData], { type: 'application/json' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'agreement.json';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        setTimeout(() => URL.revokeObjectURL(link.href), 1000);
    });

    document.getElementById('downloadSign').addEventListener('click', function() {
        if (!filledText) return;
        const bytes = createBinaryFile(filledText);
        const blob = new Blob([bytes], { type: 'application/octet-stream' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'document.iagreesign';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        setTimeout(() => URL.revokeObjectURL(link.href), 1000);
    });
</script>

</body>
</html>
