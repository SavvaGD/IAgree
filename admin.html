<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ — загрузка шаблона</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: Arial, sans-serif; background: #0d1117; color: #e6edf3; }
        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .card { background: #161b22; border-radius: 12px; padding: 40px; border: 1px solid #30363d; }
        h1 { color: #58a6ff; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #8b949e; }
        .form-group input[type="file"] { display: block; width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #e6edf3; }
        .btn { background: #238636; color: white; border: none; padding: 12px 30px; border-radius: 6px; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: #2ea043; }
        .btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
        .btn.secondary { background: #1f2937; }
        .btn.secondary:hover { background: #30363d; }
        .info { background: #1f2937; padding: 15px; border-radius: 8px; margin: 20px 0; border-left: 4px solid #238636; }
        .info.error { border-color: #f85149; }
        .hidden { display: none; }
        .back-link { display: inline-block; margin-top: 20px; color: #58a6ff; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
        footer { text-align: center; padding: 30px; color: #8b949e; font-size: 14px; border-top: 1px solid #30363d; margin-top: 40px; }
        header { background: #161b22; padding: 15px 30px; border-bottom: 1px solid #30363d; margin-bottom: 30px; }
        header > div { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        header a { color: #58a6ff; font-size: 24px; font-weight: bold; text-decoration: none; }
        header nav { display: flex; gap: 15px; flex-wrap: wrap; }
        header nav a { color: #8b949e; text-decoration: none; font-size: 14px; }
        header nav a:hover { color: #e6edf3; }
    </style>
</head>
<body>

<header>
    <div>
        <a href="index.html">📄 IAgree</a>
        <nav>
            <a href="admin.html">📤 Админ</a>
            <a href="create.html">🔑 Создать подпись</a>
            <a href="sign.html">✍️ Подписать</a>
            <a href="check.html">🔍 Проверить</a>
        </nav>
    </div>
</header>

<div class="container">
    <div class="card">
        <h1>📤 Загрузка шаблона</h1>
        <p style="color: #8b949e; margin-bottom: 20px;">Загрузите <code>.txt</code> файл с переменными <code>{...}</code> и подписью <code>&lt;...&gt;</code></p>

        <div class="form-group">
            <label for="templateFile">Выберите шаблон (.txt):</label>
            <input type="file" id="templateFile" accept=".txt">
        </div>

        <button id="generateBtn" class="btn" disabled>Сгенерировать .iagreensign</button>

        <div id="result" class="hidden" style="margin-top: 20px;">
            <div class="info">
                <p><strong>✅ Готово!</strong> Скачайте файл и отправьте клиенту.</p>
            </div>
            <button id="downloadBtn" class="btn secondary">📥 Скачать .iagreensign</button>
        </div>

        <a href="index.html" class="back-link">← На главную</a>
    </div>
</div>

<footer>© 2026 IAgree — Сервис подписания согласий</footer>

<script>
    let templateText = '';
    let iagreensignBlob = null;

    const fileInput = document.getElementById('templateFile');
    const generateBtn = document.getElementById('generateBtn');
    const resultDiv = document.getElementById('result');
    const downloadBtn = document.getElementById('downloadBtn');

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        // Проверяем расширение .txt
        if (!file.name.endsWith('.txt')) {
            alert('❌ Неверный формат! Нужен файл .txt');
            fileInput.value = '';
            return;
        }

        const reader = new FileReader();
        reader.onload = function(event) {
            templateText = event.target.result;
            generateBtn.disabled = false;
        };
        reader.readAsText(file);
    });

    generateBtn.addEventListener('click', function() {
        if (!templateText) return;

        const hasVariables = templateText.includes('{') && templateText.includes('}');
        const hasSignature = templateText.includes('<') && templateText.includes('>');

        if (!hasVariables && !hasSignature) {
            alert('⚠️ Шаблон не содержит переменных { } или подписи < >. Убедитесь, что файл корректен.');
            return;
        }

        const encoder = new TextEncoder();
        const bytes = encoder.encode(templateText);

        iagreensignBlob = new Blob([bytes], { type: 'application/octet-stream' });
        resultDiv.classList.remove('hidden');
    });

    downloadBtn.addEventListener('click', function() {
        if (!iagreensignBlob) return;
        const link = document.createElement('a');
        link.href = URL.createObjectURL(iagreensignBlob);
        link.download = 'document.iagreensign';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        setTimeout(() => URL.revokeObjectURL(link.href), 1000);
    });
</script>

</body>
</html>
